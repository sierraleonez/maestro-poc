appId: vtglobal.appdev
---
- extendedWaitUntil:
    visible: 'Personal Information'
    timeout: 10000
- takeScreenshot: '06_Personal_Information'
- waitForAnimationToEnd:
    timeout: 10000

- tapOn: 'Phone Number'
- inputText: ${output.env.PHONE_NUMBER}
- hideKeyboard

- tapOn: 'House Number'
- inputText: ${output.env.HOUSE_NUMBER}
- hideKeyboard

- scrollUntilVisible:
    element:
      text: 'Street'
- tapOn: 'Street'
- inputText: ${output.env.STREET}
- hideKeyboard

- scrollUntilVisible:
    element:
      text: 'City Name'
- tapOn: 'City Name'
- inputText: ${output.env.CITY}
- hideKeyboard

- scrollUntilVisible:
    element:
      text: 'Postal Code'
- tapOn: 'Postal Code'
- inputText: ${output.env.POSTAL_CODE}
- hideKeyboard

- takeScreenshot: '07_Personal_Information_Filled'
- tapOn:
    id: ${output.personalInformation.btnContinue}
