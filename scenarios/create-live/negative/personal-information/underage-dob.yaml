appId: vtglobal.appdev
---
- extendedWaitUntil:
    visible: 'Personal Information'
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 10000

- tapOn: 'Phone Number'
- inputText: ${output.env.PHONE_NUMBER}
- hideKeyboard

- tapOn: 'House Number'
- inputText: ${output.env.HOUSE_NUMBER}
- hideKeyboard

- scrollUntilVisible:
    element:
      text: 'Street'
- tapOn: 'Street'
- inputText: ${output.env.STREET}
- hideKeyboard

- scrollUntilVisible:
    element:
      text: 'City Name'
- tapOn: 'City Name'
- inputText: ${output.env.CITY}
- hideKeyboard

- scrollUntilVisible:
    element:
      text: 'Postal Code'
- tapOn: 'Postal Code'
- inputText: ${output.env.POSTAL_CODE}
- hideKeyboard

- scrollUntilVisible:
    element:
      text: 'Date of Birth'
- tapOn: 'Date of Birth'
- inputText: '14/02/2010'
- hideKeyboard
- takeScreenshot: 'neg_underage_dob_entered'

- tapOn:
    id: ${output.personalInformation.btnContinue}
- takeScreenshot: 'neg_underage_dob_error'

- assertVisible: 'You must be at least 18 years old'
- assertNotVisible: 'Experiences'
