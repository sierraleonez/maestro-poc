appId: vtglobal.appdev
---
- extendedWaitUntil:
    visible: 'Setup Account'
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 20000
- scrollUntilVisible:
    element:
      id: ${output.setupAccount.inputPassword}
- tapOn:
    id: ${output.setupAccount.inputPassword}
- inputText: 'Pa1!xyz'
- hideKeyboard
- takeScreenshot: 'neg_password_too_short_entered'

- tapOn: 'Continue'
- takeScreenshot: 'neg_password_too_short_error'

- assertVisible: 'Minimum 8 characters, maximum 15'
- assertNotVisible: 'Document Verification'
