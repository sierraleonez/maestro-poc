appId: vtglobal.appdev
---
- extendedWaitUntil:
    visible: 'Setup Account'
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 20000
- scrollUntilVisible:
    element:
      id: ${output.setupAccount.inputPassword}
- tapOn:
    id: ${output.setupAccount.inputPassword}
- inputText: 'Pass word123<>'
- hideKeyboard
- takeScreenshot: 'neg_password_prohibited_symbols_entered'

- tapOn: 'Continue'
- takeScreenshot: 'neg_password_prohibited_symbols_error'

- assertNotVisible: 'Document Verification'
