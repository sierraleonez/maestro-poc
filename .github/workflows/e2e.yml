name: Maestro E2E PoC

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to trigger this manually from the GitHub UI

jobs:
  maestro-test:
    runs-on: ubuntu-latest # Free tier Linux runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install Maestro CLI directly onto the runner host
      - name: Install Maestro CLI
        run: |
          curl -FsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Enable KVM permissions on the Linux Host so the emulator runs smoothly
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Spin up the Android Emulator and run the tests
      - name: Run Maestro Flows on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          disable-spellchecker: true
          cores: 2
          ram-size: 2048M
          # The script to run once the emulator is completely booted
          script: |
            echo "Emulator is up! Checking connected devices..."
            adb devices
            
            echo "Installing your application..."
            # Replace this path with the actual path to your generated .apk file
            adb install android/app/build/outputs/apk/debug/app-debug.apk 
            
            echo "Executing Maestro E2E Flows..."
            # Replace 'maestro_flows/' with your actual folder holding your yaml files
            maestro test maestro.yaml
