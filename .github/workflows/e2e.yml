name: Maestro E2E PoC (With AVD Caching)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  maestro-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Verify Maestro Installation
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          if ! command -v maestro &> /dev/null; then
            echo "❌ Maestro CLI not found."
            exit 1
          fi
          echo "✅ Maestro Ready: $(maestro --version)"

      # --- EMULATOR CACHE LAYER START ---
      - name: AVD Cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # The key binds the cache to the specific API level
          key: avd-api30-v1

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # PRIME STEP: Only runs if there's no cache. Creates a fresh, clean snapshot.
      - name: Generate AVD Snapshot (On Cache Miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: echo "Clean AVD snapshot generated and saved to cache!"
      # --- EMULATOR CACHE LAYER END ---

      # RUNNER STEP: Actually runs your tests utilizing the cached snapshot
      - name: Run Maestro Flows on Cached Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          # CRITICAL: -no-snapshot-save ensures your tests don't mess up the cache baseline
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "Emulator loaded directly from cached snapshot state!"
            adb devices
            
            # Install your app
            adb install apk/app-release.apk
            
            # Execute your tests
            maestro test maestro.yaml
