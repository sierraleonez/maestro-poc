appId: vtglobal.appdev
---
- launchApp:
    clearState: true
# ============================================
# PHASE 1: Language Selection
# ============================================
- assertVisible:
    id: 'selectLang_radio_en'
- takeScreenshot: '01_Language_Selection'

- tapOn:
    id: 'selectLang_radio_en'

- tapOn:
    id: 'selectLang_btn_continue'

# ============================================
# PHASE 2: Video Onboarding
# ============================================
- extendedWaitUntil:
    visible:
      id: 'video_btn_login'
    timeout: 5000
- takeScreenshot: '02_Video_Onboarding'
